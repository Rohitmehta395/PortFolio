name: Keep Alive Render Backend

on:
  schedule:
    # Runs every 14 minutes to prevent Render spin-down
    # This schedule runs from 4 AM UTC to 6 PM UTC (approx. 9:30 AM to 11:30 PM IST)
    # This helps save Render free tier hours compared to 24/7 pings
    - cron: '*/14 4-18 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s https://rohit-mehta-portfolio-backend.onrender.com/api/ping
          echo "Pinged Render backend at $(date)"
